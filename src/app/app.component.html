

<nav class="navbar">
	<div class="navbar-content">
		<img src="assets/logo.svg" alt="Logo" class="navbar-logo" />
		<span class="navbar-title">BeautyStore</span>
	</div>
</nav>

	<main class="beautystore-main">
		<button class="fab-add" (click)="openNewProductModal()" title="Agregar producto">＋</button>
		<app-product-list (editProduct)="openEditProductModal($event)" [key]="listKey"></app-product-list>
		<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
		<div class="modal-form" *ngIf="showModal">
			<button class="close-modal" (click)="closeModal()">×</button>
			<app-product-form [editingProduct]="editingProduct" (formClosed)="closeModal(); refreshList()"></app-product-form>
		</div>
	</main>
